# ─────────────────────────────────────────────────────────────────────────────
#  release — release-please–driven release flow.
#
#  Two jobs, single workflow:
#
#  1.  `release-please` runs on every push to `master`. It maintains a
#      long-lived "Release PR" that aggregates Conventional Commits since
#      the last release, computes the next semver bump, updates
#      `Cargo.toml` + `Cargo.lock` + `CHANGELOG.md`, and (when that PR is
#      merged) creates the GitHub Release and pushes the `vX.Y.Z` tag.
#
#  2.  `publish` runs only when the Release PR has just been merged
#      (`release_created == true`). It re-runs the local gates and pushes
#      the Docker image to Docker Hub at the new version, plus `:latest`.
#
#  Required secrets (Settings → Secrets and variables → Actions):
#    - RELEASE_PAT       — Personal Access Token with `repo` scope.
#                          Required because release-please needs to push
#                          commits and tags from a workflow in a way that
#                          re-triggers downstream events; the default
#                          `GITHUB_TOKEN` cannot.
#    - DOCKERHUB_USERNAME — Docker Hub login (e.g. `aartintelligent`).
#    - DOCKERHUB_TOKEN    — Docker Hub Personal Access Token with
#                            `Read, Write, Delete` scope on
#                            `aartintelligent/claude-mcp-fastly`.
#
#  Configuration lives in:
#    - release-please-config.json     — release-type, sections, scopes
#    - .release.json                  — current version state
# ─────────────────────────────────────────────────────────────────────────────
name: release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  IMAGE: aartintelligent/claude-mcp-fastly

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release.json

  publish:
    name: publish ${{ needs.release-please.outputs.tag_name }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Re-run the local gates
        # Belt and braces: PR-time CI already ran these, but we want
        # certainty on every published artifact.
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --locked -- -D warnings
          cargo test --locked

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          pull: true # pull fresh DHI base images at every release
          tags: |
            ${{ env.IMAGE }}:${{ needs.release-please.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
